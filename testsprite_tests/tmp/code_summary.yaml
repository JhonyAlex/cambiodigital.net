version: "2"
type: frontend
tech_stack:
  - HTML5 static site
  - TailwindCSS (pre-compiled via PostCSS)
  - Vanilla JavaScript ES6+
  - Lucide Icons (CDN)
  - Google Fonts (Inter, Space Mono)
  - html2canvas 1.4.1 (CDN)
  - n8n (self-hosted webhook integration)
  - Stripe (payment links)
  - WhatsApp Business API (wa.me deeplinks)
  - Google Calendar App scheduling

routes:
  - path: /index.html
    file: index.html
    auth_required: false
    description: Main landing page. Hero with video, animated counters, service grid, process steps, case studies teaser, testimonials slider, blog preview (fetched), contact section (fetched from partial), cookie consent banner.

  - path: /cotizador.html
    file: cotizador.html
    auth_required: false
    description: 3-step interactive quote calculator rendered by JS. Step 1 category selection (or diagnostic quiz), Step 2 service selection with price summary, Step 3 contact form submission to n8n webhook.

  - path: /blog.html
    file: blog.html
    auth_required: false
    description: Blog listing page. Grid of article cards with category badges and CTA links to blog posts.

  - path: /casos.html
    file: casos.html
    auth_required: false
    description: Case studies page with client-side filter buttons (Todos, Chatbots, CRM, Web, IT Partner).

  - path: /como-trabajamos.html
    file: como-trabajamos.html
    auth_required: false
    description: How We Work page explaining 4-phase process, tech stack, payment terms, and team.

  - path: /condiciones-servicio.html
    file: condiciones-servicio.html
    auth_required: false
    description: Static terms of service legal page.

  - path: /politica-privacidad.html
    file: politica-privacidad.html
    auth_required: false
    description: Privacy policy with interactive cookie preferences trigger button.

  - path: /distribuidores.html
    file: distribuidores.html
    auth_required: false
    description: Reseller/partner program page (noindex). 3 distribution packages, margin calculator concept, WhatsApp CTA.

  - path: /kit-medios.html
    file: kit-medios.html
    auth_required: false
    description: Press and media kit page with corporate info, stats, brand resource request CTAs.

  - path: /servicios/it-partner.html
    file: servicios/it-partner.html
    auth_required: false
    description: IT Partner service detail page with Standard ($50/mo) and Evolution ($300/mo) Stripe checkout links.

  - path: /servicios/bienvenida.html
    file: servicios/bienvenida.html
    auth_required: false
    description: Private client onboarding page (noindex). WhatsApp support link, service request form to n8n.

  - path: /blog/organiza-clientes-crm.html
    file: blog/organiza-clientes-crm.html
    auth_required: false
    description: Blog article about organizing clients with CRM.

  - path: /blog/por-que-usar-crm.html
    file: blog/por-que-usar-crm.html
    auth_required: false
    description: Blog article about why to use a CRM.

  - path: /blog/automatizacion-redes-sociales.html
    file: blog/automatizacion-redes-sociales.html
    auth_required: false
    description: Blog article about automating social media.

  - path: /blog/mitos-automatizacion.html
    file: blog/mitos-automatizacion.html
    auth_required: false
    description: Blog article debunking automation myths.

features:
  - name: Simple Contact Form (Hablemos)
    description: 3-field contact form loaded via fetch into #contact-container. Name, company, contact method toggle (email or phone+country code), message. Submits FormData POST to n8n webhook. Shows success popup on 200 OK.
    files:
      - partials/contact.html
      - index.html
    entry_route: /index.html#contacto
    user_interactions:
      - Click "Hablemos" tab (active by default)
      - Fill name field (required)
      - Fill company field (optional)
      - Select contact method radio (Email or Teléfono/WhatsApp)
      - Fill email or select country code + fill phone number
      - Fill message textarea (required)
      - Click "Enviar Mensaje" submit button
      - See success popup after successful submission
    api_calls:
      - method: POST
        endpoint: https://n8n.cambiodigital.cloud/webhook/c1692d85-8ad6-4977-b484-541c16463d0a
    auth_required: false

  - name: Service Request Form (Ticket)
    description: Service ticket creation form in second tab of contact widget. Has file attachment support (image/PDF max 50MB). Posts FormData to n8n.
    files:
      - partials/contact.html
      - index.html
    entry_route: /index.html#servicio
    user_interactions:
      - Click "Solicitud de Servicio" tab
      - Fill requester name (required)
      - Select contact method and fill email or phone+country
      - Fill task title (required)
      - Fill task description (required)
      - Pick desired start date (required)
      - Optionally attach file (image or PDF)
      - Click "Crear Solicitud" submit button
      - See success popup after submission
    api_calls:
      - method: POST
        endpoint: https://n8n.cambiodigital.cloud/webhook/c1692d85-8ad6-4977-b484-541c16463d0a
    auth_required: false

  - name: Appointment Scheduling Tabs
    description: Third tab in contact widget. 3 meeting type cards linking to Google Calendar booking pages in new tab.
    files:
      - partials/contact.html
    entry_route: /index.html#agendar
    user_interactions:
      - Click "Agendar" tab
      - Click appointment type card (Asesoría Comercial, Capacitación, or Solicitud de Servicio)
      - Redirected to Google Calendar scheduling link in new tab
    api_calls: []
    auth_required: false

  - name: Interactive Quote Calculator
    description: 3-step JS-rendered wizard. Step 1 category selection grid, Step 2 service cards with optional extras and live price sidebar, Step 3 lead form. Supports URL hash deep-linking to pre-select categories.
    files:
      - assets/js/calculator.js
      - cotizador.html
    entry_route: /cotizador.html
    user_interactions:
      - Select one or more service categories on Step 1
      - Click "Continuar" to advance to Step 2
      - Toggle service cards on/off by clicking them
      - Toggle optional extras checkboxes per service
      - Increment/decrement counter extras
      - View real-time price summary sidebar (one-time + monthly + savings)
      - Click "Solicitar Cotización" to advance to Step 3
      - Fill name (required), company, email (required), phone (required), comments
      - Click "Enviar Cotización" to submit JSON to n8n
    api_calls:
      - method: POST
        endpoint: https://n8n.cambiodigital.cloud/webhook/c1692d85-8ad6-4977-b484-541c16463d0a
    auth_required: false

  - name: Diagnostic Quiz (inside Calculator)
    description: 3-question guided quiz triggered by "No sé por dónde empezar" button on Step 1. Auto-selects service categories based on combined answers.
    files:
      - assets/js/calculator.js
    entry_route: /cotizador.html
    user_interactions:
      - Click "No sé por dónde empezar" button
      - Answer question 1 (what wastes your time)
      - Answer question 2 (do you have a website)
      - Answer question 3 (what is most urgent)
      - Quiz auto-selects recommended categories and returns to Step 1
    api_calls: []
    auth_required: false

  - name: Case Studies Filter
    description: Client-side category filter on /casos.html using data-category attributes on grid cards.
    files:
      - casos.html
    entry_route: /casos.html
    user_interactions:
      - Click filter button "Todos" to show all cases
      - Click "Chatbots" to show chatbot cases only
      - Click "CRM" to show CRM cases only
      - Click "Web" to show web cases only
      - Click "IT Partner" to show IT partner cases only
    api_calls: []
    auth_required: false

  - name: Cookie Consent Banner (GDPR)
    description: GDPR-style cookie consent loaded from partial. 3 actions (Accept All, Reject Optional, Configure). Preferences stored in localStorage (cd_cookie_consent). Configurable via preferences panel toggle.
    files:
      - assets/js/cookie-consent.js
      - assets/js/config.js
      - partials/cookie-consent.html
    entry_route: /index.html
    user_interactions:
      - Banner auto-shows after 900ms delay on first visit
      - Click "Aceptar Todo" to accept all cookies
      - Click "Rechazar Opcionales" to accept necessary cookies only
      - Click "Configurar" to open preferences panel
      - Toggle analytics and marketing checkboxes in panel
      - Click "Guardar Preferencias" to save custom preferences
      - Click "Configurar Cookies" in privacy policy or footer to reopen panel
    api_calls: []
    auth_required: false

  - name: Dark/Light/Auto Theme Toggle
    description: Theme switcher in navbar (desktop and mobile). Cycles auto/dark/light. Stored in localStorage (cd-theme). Swaps logo image between light/dark variants.
    files:
      - assets/js/theme-toggle.js
      - partials/header.html
    entry_route: /index.html
    user_interactions:
      - Click sun/moon toggle button in header
      - Theme cycles between auto, dark, and light modes
      - Preference is persisted across page refreshes
    api_calls: []
    auth_required: false

  - name: IT Partner Plan Purchase (Stripe)
    description: Direct Stripe checkout links for Standard ($50/mo) and Evolution ($300/mo) IT Partner plans.
    files:
      - servicios/it-partner.html
    entry_route: /servicios/it-partner.html
    user_interactions:
      - View plan comparison table (Standard vs Evolution)
      - Click "Activar Estándar" button → Stripe checkout opens in new tab
      - Click "Activar Evolución" button → Stripe checkout opens in new tab
    api_calls:
      - type: external_redirect
        endpoint: https://buy.stripe.com (Standard plan)
      - type: external_redirect
        endpoint: https://buy.stripe.com (Evolution plan)
    auth_required: false

  - name: Scroll Reveal Animations
    description: IntersectionObserver-based reveal for .reveal, .reveal-left, .reveal-right, .reveal-scale elements. Adds 'active' class on viewport intersection. Supports data-delay for stagger.
    files:
      - assets/js/animations.js
    entry_route: /index.html
    user_interactions:
      - Scroll down any page to trigger reveal animations on elements entering viewport
    api_calls: []
    auth_required: false

  - name: Animated Social Proof Counters
    description: Counter elements animate from 0 to their data-target value with ease-out cubic easing when entering viewport. Prevents re-animation after first play.
    files:
      - assets/js/animations.js
    entry_route: /index.html
    user_interactions:
      - Scroll to stats section on homepage to see counters animate (500+ clients, 10+ countries, 200+ hours saved)
    api_calls: []
    auth_required: false

  - name: Navigation Menu (Desktop and Mobile)
    description: Responsive navbar loaded from partials/header.html. Desktop nav with dropdown. Mobile hamburger menu with slide-in drawer. Theme toggle and WhatsApp CTA in header.
    files:
      - partials/header.html
      - assets/js/layout-loader.js
    entry_route: /index.html
    user_interactions:
      - Click hamburger icon to toggle mobile menu
      - Click nav links to navigate between pages
      - Click "Cotizar Ahora" primary CTA in header
      - Hover over service categories dropdown in desktop nav
    api_calls: []
    auth_required: false

  - name: WhatsApp Country-Aware CTA Routing
    description: buildWhatsAppUrl() dynamically selects Colombia (+57) or Spain (+34) WhatsApp number based on country code selected in contact forms. CTA links update in real-time.
    files:
      - assets/js/config.js
      - index.html
      - partials/contact.html
    entry_route: /index.html
    user_interactions:
      - Change country code dropdown in contact form → WhatsApp link in page CTAs dynamically updates
    api_calls: []
    auth_required: false

  - name: Blog Post Pages
    description: Individual blog article pages with structured content, related post links, and CTA sections. All posts link back to /blog.html and have CTAs linking to /cotizador.html.
    files:
      - blog/organiza-clientes-crm.html
      - blog/por-que-usar-crm.html
      - blog/automatizacion-redes-sociales.html
      - blog/mitos-automatizacion.html
      - blog/vendedor-ia-agenda-citas-google-calendar.html
      - blog/whatsapp-business-vender-sin-ser-invasivo-2026.html
      - blog/automatizar-tareas-repetitivas.html
    entry_route: /blog.html
    user_interactions:
      - Click article card on blog listing page → navigate to article
      - Click in-article CTA links to cotizador or contact
      - Click "Volver al Blog" link to return to listing
    api_calls: []
    auth_required: false

known_limitations:
  - issue: Contact forms and quote form POST to live n8n webhook — tests with real submissions will hit production
    location: partials/contact.html, assets/js/calculator.js
    impact: Test form submissions cannot be intercepted; they will create real leads in n8n workflows
  - issue: Header and contact partial loaded asynchronously via fetch() from relative paths — tests must wait for DOM injection
    location: index.html (fetch partials/header.html, partials/contact.html)
    impact: Navigation and contact form elements may not be immediately available on page load
  - issue: COTIZADOR_PLAN_A_MEDIDA.html is a dev artifact not linked from any navigation
    location: COTIZADOR_PLAN_A_MEDIDA.html
    impact: Cannot be reached through normal user flow; direct URL access only
  - issue: servicios/bienvenida.html and distribuidores.html are noindex private pages not linked from navigation
    location: servicios/bienvenida.html, distribuidores.html
    impact: Can only be accessed via direct URL
